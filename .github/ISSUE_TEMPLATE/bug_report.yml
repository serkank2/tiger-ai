name: 🐞 Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. 0.1.0 or commit sha
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
