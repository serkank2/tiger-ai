name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: typecheck · test · build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # node-pty builds a native addon; ubuntu-latest ships the needed toolchain.
      - name: Install dependencies
        run: npm ci

      - name: Type-check (backend + frontend)
        run: npm run typecheck

      - name: Test — backend
        run: npm test -w @kaplan/backend

      - name: Test — frontend
        run: npm test -w @kaplan/frontend

      - name: Build — frontend
        run: npm run build:frontend
