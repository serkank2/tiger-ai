name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint · format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint is the gate: it must exit 0 (warnings allowed, zero errors).
      - name: Lint (ESLint)
        run: npm run lint

      # Prettier check is advisory — report drift without failing the build so
      # formatting nits never block a merge.
      - name: Format check (Prettier, non-blocking)
        run: npm run format:check
        continue-on-error: true

  build-and-test:
    name: typecheck · test · build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # node-pty builds a native addon; ubuntu-latest ships the needed toolchain.
      - name: Install dependencies
        run: npm ci

      - name: Type-check (backend + frontend)
        run: npm run typecheck

      - name: Test — backend
        run: npm test -w @kaplan/backend

      - name: Test — frontend
        run: npm test -w @kaplan/frontend

      - name: Build — frontend
        run: npm run build:frontend
